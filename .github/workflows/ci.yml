name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  GOLANGCI_LINT_VERSION: "v2.4.0"

jobs:
  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Install and run golangci-lint
        run: |
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@${{ env.GOLANGCI_LINT_VERSION }}
          "$(go env GOPATH)/bin/golangci-lint" run ./...

  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: go test -race -coverprofile=coverage.txt -covermode=atomic ./...

  bpf:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install eBPF toolchain
        run: ./scripts/install-ebpf-toolchain.sh
      - name: Generate vmlinux.h from kernel BTF
        run: ./scripts/gen-vmlinux.sh
      - name: Compile eBPF objects
        run: make bpf

  build:
    runs-on: ubuntu-24.04
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: make build

  # Loading the programs exercises the verifier on a real kernel. GitHub runners
  # are privileged VMs, so a smoke load is possible; the kernel-version matrix
  # (5.8 / 5.15 / 6.1 / 6.8) belongs here via a vmtest-style harness — tracked in
  # docs/ROADMAP.md.
