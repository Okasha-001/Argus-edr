# R-0060 — process injection via ptrace
- name: ptrace ATTACH fires R-0060
  rule: R-0060
  expect: fire
  event: { action: ptrace, process: { name: injector }, syscall: { request: 16, target_pid: 1234 } }
- name: ptrace TRACEME does not fire R-0060
  rule: R-0060
  expect: no-fire
  event: { action: ptrace, process: { name: gdb }, syscall: { request: 0 } }

