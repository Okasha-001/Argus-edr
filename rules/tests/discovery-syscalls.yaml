# Detection-as-code fixtures: discovery & syscall sensors.

# R-0017 — system owner/user discovery
- name: whoami fires R-0017
  rule: R-0017
  expect: fire
  event: { action: exec, process: { name: whoami } }
- name: ls does not fire R-0017
  rule: R-0017
  expect: no-fire
  event: { action: exec, process: { name: ls } }

# R-0018 — system information discovery
- name: uname fires R-0018
  rule: R-0018
  expect: fire
  event: { action: exec, process: { name: uname } }
- name: ls does not fire R-0018
  rule: R-0018
  expect: no-fire
  event: { action: exec, process: { name: ls } }

# R-0019 — SUID/SGID search
- name: find -perm -u=s fires R-0019
  rule: R-0019
  expect: fire
  event: { action: exec, process: { name: find, command_line: "find / -perm -u=s -type f" } }
- name: find by name does not fire R-0019
  rule: R-0019
  expect: no-fire
  event: { action: exec, process: { name: find, command_line: "find / -name '*.log'" } }

# R-0020 — account discovery via passwd
- name: cat /etc/passwd fires R-0020
  rule: R-0020
  expect: fire
  event: { action: exec, process: { name: cat, command_line: "cat /etc/passwd" } }
- name: cat /etc/hosts does not fire R-0020
  rule: R-0020
  expect: no-fire
  event: { action: exec, process: { name: cat, command_line: "cat /etc/hosts" } }

