# R-0065 — privilege escalation to root via setuid
- name: setuid(0) fires R-0065
  rule: R-0065
  expect: fire
  event: { action: setuid, process: { name: exploit }, syscall: { new_uid: 0 } }
- name: setuid to a normal user does not fire R-0065
  rule: R-0065
  expect: no-fire
  event: { action: setuid, process: { name: su }, syscall: { new_uid: 1000 } }
