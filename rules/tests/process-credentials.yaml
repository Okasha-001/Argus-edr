# Detection-as-code fixtures: process execution & credential access.
# Each rule proves it fires on the behaviour it targets and stays silent on a
# benign look-alike. Run with `make test-rules`.

# R-0001 — execution from a temporary directory
- name: binary run from /tmp fires R-0001
  rule: R-0001
  expect: fire
  event: { action: exec, process: { name: x, executable: /tmp/.x/payload } }
- name: system binary does not fire R-0001
  rule: R-0001
  expect: no-fire
  event: { action: exec, process: { name: ls, executable: /usr/bin/ls } }

# R-0007 — reverse shell from a service process
- name: shell with socket stdio under nginx fires R-0007
  rule: R-0007
  expect: fire
  event: { action: exec, process: { name: bash, parent_name: nginx, stdio_socket: true } }
- name: interactive shell under a login shell does not fire R-0007
  rule: R-0007
  expect: no-fire
  event: { action: exec, process: { name: bash, parent_name: bash, stdio_socket: true } }

# R-0002 — sensitive credential file accessed
- name: unknown process opening /etc/shadow fires R-0002
  rule: R-0002
  expect: fire
  event: { action: open, process: { name: exfil }, file: { path: /etc/shadow } }
- name: sshd opening /etc/shadow is allowlisted (R-0002 silent)
  rule: R-0002
  expect: no-fire
  event: { action: open, process: { name: sshd }, file: { path: /etc/shadow } }

# R-0070 — shadow file copied or read by command
- name: cat of /etc/shadow fires R-0070
  rule: R-0070
  expect: fire
  event: { action: exec, process: { name: cat, command_line: "cat /etc/shadow" } }
- name: cat of /etc/passwd does not fire R-0070
  rule: R-0070
  expect: no-fire
  event: { action: exec, process: { name: cat, command_line: "cat /etc/passwd" } }

# R-0071 — brute-force / cracking tool
- name: hydra fires R-0071
  rule: R-0071
  expect: fire
  event: { action: exec, process: { name: hydra, command_line: "hydra -l root ssh://host" } }
- name: curl does not fire R-0071
  rule: R-0071
  expect: no-fire
  event: { action: exec, process: { name: curl } }

# R-0072 — process memory dump for credentials
- name: gcore against a pid fires R-0072
  rule: R-0072
  expect: fire
  event: { action: exec, process: { name: gcore, command_line: "gcore 1432" } }
- name: ordinary ls does not fire R-0072
  rule: R-0072
  expect: no-fire
  event: { action: exec, process: { name: ls, command_line: "ls -la" } }
