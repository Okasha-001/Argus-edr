# Defense-evasion and privilege-escalation detections.

- id: R-0014
  name: Log tampering
  description: A file under /var/log was deleted or renamed, an attempt to remove evidence.
  severity: high
  risk_score: 40
  technique:
    id: T1070
    name: Indicator Removal
    tactic: defense-evasion
  match:
    all:
      - { field: event.type, op: in, value: [unlink, rename] }
      - { field: file.path, op: startswith, value: "/var/log/" }

- id: R-0015
  name: Setuid bit added to a file
  description: A chmod set the setuid bit (mode >= 04000), a route to privilege escalation.
  severity: high
  risk_score: 45
  technique:
    id: T1548.001
    name: "Abuse Elevation Control Mechanism: Setuid and Setgid"
    tactic: privilege-escalation
  match:
    all:
      - { field: event.type, op: eq, value: chmod }
      - { field: file.mode, op: ge, value: 2048 }

- id: R-0016
  name: Shell history tampering
  description: A shell history file was deleted or truncated, anti-forensics to hide commands.
  severity: medium
  risk_score: 30
  technique:
    id: T1070.003
    name: "Indicator Removal: Clear Command History"
    tactic: defense-evasion
  match:
    all:
      - { field: event.type, op: in, value: [unlink, rename] }
      - { field: file.path, op: endswith, value: ".bash_history" }

- id: R-0067
  name: Security tooling disabled
  description: A process disabled SELinux/AppArmor enforcement or flushed the firewall — impairing host defences.
  severity: high
  risk_score: 50
  technique:
    id: T1562.001
    name: "Impair Defenses: Disable or Modify Tools"
    tactic: defense-evasion
  match:
    all:
      - { field: event.type, op: eq, value: exec }
      - { field: process.command_line, op: regex, value: 'setenforce\s+0|ufw\s+disable|iptables\s+-F|nft\s+flush\s+ruleset|aa-disable|systemctl\s+stop\s+(auditd|apparmor|firewalld)' }

- id: R-0068
  name: System log cleared
  description: A process truncated or vacuumed the system logs — indicator removal beyond a single file.
  severity: high
  risk_score: 45
  technique:
    id: T1070.002
    name: "Indicator Removal: Clear Linux or Mac System Logs"
    tactic: defense-evasion
  match:
    all:
      - { field: event.type, op: eq, value: exec }
      - { field: process.command_line, op: regex, value: 'journalctl\s+--vacuum|truncate\s+-s\s*0\s+/var/log|>\s*/var/log/\S|\bshred\b.*/var/log' }

- id: R-0069
  name: Base64-decoded command piped to a shell
  description: A process decoded base64 and piped the result to a shell — obfuscated payload execution.
  severity: high
  risk_score: 50
  technique:
    id: T1140
    name: Deobfuscate/Decode Files or Information
    tactic: defense-evasion
  match:
    all:
      - { field: event.type, op: eq, value: exec }
      - { field: process.command_line, op: regex, value: 'base64\s+(-d|--decode|-di).*\|\s*(ba)?sh\b|echo\s+\S+\s*\|\s*base64\s+-d' }
