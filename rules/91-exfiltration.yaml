# Exfiltration detections (ATT&CK TA0010).

- id: R-0033
  name: Exfiltration over a raw socket utility
  description: A process piped data out through netcat/socat — exfiltration over a non-application protocol.
  severity: high
  risk_score: 50
  technique:
    id: T1048
    name: Exfiltration Over Alternative Protocol
    tactic: exfiltration
  match:
    all:
      - { field: event.type, op: eq, value: exec }
      - { field: process.command_line, op: regex, value: '\b(nc|ncat|netcat|socat)\b.*(<|exec|TCP:|tcp-connect)' }

- id: R-0034
  name: Exfiltration to a public file-sharing service
  description: A process uploaded data to a paste or file-drop service (transfer.sh, pastebin, file.io, 0x0.st).
  severity: high
  risk_score: 50
  technique:
    id: T1567.002
    name: "Exfiltration Over Web Service: Exfiltration to Cloud Storage"
    tactic: exfiltration
  match:
    all:
      - { field: event.type, op: eq, value: exec }
      - { field: process.command_line, op: regex, value: 'transfer\.sh|pastebin\.com|file\.io|0x0\.st|ix\.io|termbin\.com|oshi\.at' }

- id: R-0035
  name: HTTP upload of local data
  description: A process used curl/wget to POST or upload a local file to a remote endpoint — exfiltration over the C2 or web channel.
  severity: medium
  risk_score: 40
  technique:
    id: T1041
    name: Exfiltration Over C2 Channel
    tactic: exfiltration
  match:
    all:
      - { field: event.type, op: eq, value: exec }
      - { field: process.command_line, op: regex, value: 'curl\s+.*(-T\s|--upload-file|--data-binary\s+@|-d\s+@|-F\s+\S+=@)|wget\s+.*--post-file' }
