# Credential-access detections.
#
# Note: the openat sensor forwards only writes/creates to keep the ring buffer
# quiet, so a *read* of /etc/shadow is surfaced live by the file_open LSM hook
# (see docs/DETECTIONS.md). This rule matches such an open event from either
# source, and from replayed event streams.

- id: R-0002
  name: Sensitive credential file accessed
  description: A process opened /etc/shadow or /etc/gshadow — OS credential dumping.
  severity: critical
  risk_score: 80
  technique:
    id: T1003
    name: OS Credential Dumping
    tactic: credential-access
  match:
    all:
      - { field: event.type, op: eq, value: open }
      - { field: file.path, op: in, value: ["/etc/shadow", "/etc/gshadow"] }
