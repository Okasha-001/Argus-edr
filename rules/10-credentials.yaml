# Credential-access detections.
#
# Note: the openat sensor forwards only writes/creates to keep the ring buffer
# quiet, so a *read* of /etc/shadow is surfaced live by the security_file_open
# sensor (see docs/DETECTIONS.md). This rule matches such an open event from
# either source, and from replayed event streams.

- id: R-0002
  name: Sensitive credential file accessed
  description: >
    A process opened /etc/shadow or /etc/gshadow outside the normal
    authentication stack — OS credential dumping. The process allowlist below
    suppresses the routine reads done by PAM and account tooling; it matches the
    16-byte kernel comm and is necessarily heuristic (and spoofable), so pair it
    with process-lineage and anomaly context.
  severity: critical
  risk_score: 80
  technique:
    id: T1003
    name: OS Credential Dumping
    tactic: credential-access
  match:
    all:
      - { field: event.type, op: eq, value: open }
      - { field: file.path, op: in, value: ["/etc/shadow", "/etc/gshadow"] }
      - field: process.name
        op: not_in
        value: ["login", "sshd", "sshd-session", "su", "sudo", "passwd",
                 "unix_chkpwd", "unix_update", "systemd-logind", "chpasswd",
                 "gpasswd", "chage", "useradd", "usermod", "userdel", "newusers",
                 "vipw", "cron", "crond", "gdm", "lightdm", "sddm", "sssd", "nscd"]

- id: R-0070
  name: Shadow file copied or read by command
  description: A command-line tool read or copied /etc/shadow (which is not world-readable) — credential dumping intent, independent of the live open sensor.
  severity: critical
  risk_score: 70
  technique:
    id: T1003.008
    name: "OS Credential Dumping: /etc/passwd and /etc/shadow"
    tactic: credential-access
  match:
    all:
      - { field: event.type, op: eq, value: exec }
      - { field: process.command_line, op: regex, value: '(cat|cp|less|more|head|tail|strings|base64|xxd|od)\s+.*/etc/(shadow|gshadow)\b' }

- id: R-0071
  name: Password brute-force or cracking tool
  description: A known credential brute-forcer or hash cracker ran (hydra, medusa, john, hashcat, ...).
  severity: high
  risk_score: 50
  technique:
    id: T1110
    name: Brute Force
    tactic: credential-access
  match:
    all:
      - { field: event.type, op: eq, value: exec }
      - { field: process.name, op: in, value: [hydra, medusa, ncrack, john, hashcat, crowbar, patator, "john-the-ripper"] }

- id: R-0072
  name: Process memory dump for credentials
  description: A process dumped another process's memory (gcore, /proc/<pid>/mem) — harvesting secrets from RAM.
  severity: high
  risk_score: 55
  technique:
    id: T1003.007
    name: "OS Credential Dumping: Proc Filesystem"
    tactic: credential-access
  match:
    all:
      - { field: event.type, op: eq, value: exec }
      - { field: process.command_line, op: regex, value: '\bgcore\b|/proc/\d+/mem\b|\bmimipenguin\b|\blaZagne\b' }
