# Syscall sensors: process injection, rootkits, fileless execution, privilege
# changes. These consume the event types emitted by the ptrace/kmod/bpf/memfd/
# mmap/setuid sensors (bpf/edr.bpf.c).

- id: R-0060
  name: Process injection via ptrace
  description: A process called ptrace with a write/attach request against another process — the classic code-injection primitive.
  severity: high
  risk_score: 60
  technique:
    id: T1055
    name: Process Injection
    tactic: defense-evasion
  match:
    all:
      - { field: event.type, op: eq, value: ptrace }
      # PTRACE_POKETEXT=4, POKEDATA=5, POKEUSR=6, ATTACH=16, SEIZE=16902
      - { field: syscall.request, op: in, value: [4, 5, 6, 16, 16902] }

- id: R-0061
  name: Kernel module loaded
  description: A kernel module was loaded — legitimate at boot, but a common rootkit and persistence vector at runtime.
  severity: high
  risk_score: 55
  technique:
    id: T1547.006
    name: Kernel Modules and Extensions
    tactic: persistence
  match: { field: event.type, op: eq, value: module_load }

- id: R-0062
  name: bpf() syscall from an unexpected process
  description: A process invoked bpf() — used to load eBPF programs or tamper with maps. Outside known tooling this can indicate a malicious or defense-evading program.
  severity: medium
  risk_score: 40
  technique:
    id: T1059
    name: Command and Scripting Interpreter
    tactic: execution
  match:
    all:
      - { field: event.type, op: eq, value: bpf }
      - { field: process.name, op: not_in, value: [bpftool, argus, argus-server, systemd] }

- id: R-0063
  name: Fileless payload staging (memfd_create)
  description: memfd_create allocates an anonymous in-memory file, the staging step for fileless execution that leaves nothing on disk.
  severity: high
  risk_score: 55
  technique:
    id: T1620
    name: Reflective Code Loading
    tactic: defense-evasion
  match: { field: event.type, op: eq, value: memfd_create }

- id: R-0064
  name: Writable and executable memory mapping
  description: A mapping was created or changed to be both writable and executable (RWX) — the hallmark of shellcode or a JIT-style loader.
  severity: medium
  risk_score: 45
  technique:
    id: T1055
    name: Process Injection
    tactic: defense-evasion
  match: { field: event.type, op: eq, value: mmap_exec }

- id: R-0065
  name: Privilege escalation to root via setuid
  description: A process requested setuid(0). Combined with a non-root parent this is a strong local-privilege-escalation signal.
  severity: high
  risk_score: 50
  technique:
    id: T1548
    name: Abuse Elevation Control Mechanism
    tactic: privilege-escalation
  match:
    all:
      - { field: event.type, op: eq, value: setuid }
      - { field: syscall.new_uid, op: eq, value: 0 }
