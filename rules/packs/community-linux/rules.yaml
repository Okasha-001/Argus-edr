# Community Linux detections. IDs are namespaced (C-) so they never collide with
# the built-in R- rules. Load with detect.LoadPack and verify the signature.

- id: C-0001
  name: Shell spawned by a web server (web shell)
  description: A web server process executed a shell or interpreter — the classic web-shell behaviour where attacker input runs commands through the server.
  severity: high
  risk_score: 55
  technique:
    id: T1505.003
    name: "Server Software Component: Web Shell"
    tactic: persistence
  match:
    all:
      - { field: event.type, op: eq, value: exec }
      - { field: process.parent.name, op: in, value: [php-fpm, apache2, httpd, nginx, node] }
      - { field: process.name, op: in, value: [sh, bash, dash, python, python3, perl] }

- id: C-0002
  name: Scheduled task via at
  description: A job was queued with the `at` command — a quieter persistence path than cron that is easy to miss.
  severity: medium
  risk_score: 35
  technique:
    id: T1053.002
    name: "Scheduled Task/Job: At"
    tactic: persistence
  match:
    all:
      - { field: event.type, op: eq, value: exec }
      - { field: process.name, op: eq, value: at }
