# Anomaly-assisted detections. These only fire when anomaly scoring is enabled
# (anomaly.enabled + a trained baseline_file, or `argus replay --baseline`).
# Without a baseline, anomaly.score is 0 and these rules stay silent.

- id: R-0050
  name: Anomalous process execution (rare against baseline)
  description: A process execution scored highly anomalous against the learned baseline — a rare executable, parent→child pair, or destination not seen during training. Surfaces the unknown that signature rules miss.
  severity: medium
  risk_score: 40
  technique:
    id: T1059
    name: Command and Scripting Interpreter
    tactic: execution
  match:
    all:
      - { field: event.type, op: eq, value: exec }
      - { field: anomaly.score, op: ge, value: 90 }
